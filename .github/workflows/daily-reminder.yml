name: Daily Attendance Reminder

# Render's free tier spins the backend down after 15 min idle, which can
# silence the in-process APScheduler job if nothing else hits the server
# around REMINDER_HOUR. This workflow is the reliable trigger: it runs on
# its own schedule (independent of whether Render is awake), logs in as an
# admin teacher, and calls the same /admin/trigger-reminders endpoint the
# scheduler itself uses. The login call also happens to wake a sleeping
# instance, which is why the timeout below is generous.
#
# Setup: add three repo secrets (Settings -> Secrets and variables ->
# Actions -> New repository secret):
#   API_BASE_URL   e.g. https://marks-entry-attendance-api.onrender.com
#   ADMIN_EMAIL    an is_admin=true teacher's email
#   ADMIN_PASSWORD that teacher's password
#
# See DEPLOYMENT.md for the cron-time-vs-your-local-timezone conversion,
# and for a lower-privilege alternative to using real admin credentials
# here if you want to harden this later.

on:
  schedule:
    # 17:00 UTC daily - keep this in sync with REMINDER_HOUR/REMINDER_MINUTE
    # on the backend (Render containers run in UTC, not your local time).
    - cron: "0 17 * * *"
  workflow_dispatch: {} # manual "Run workflow" button in the Actions tab, for testing

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Log in and trigger the reminder job
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ] || [ -z "${ADMIN_EMAIL:-}" ] || [ -z "${ADMIN_PASSWORD:-}" ]; then
            echo "Missing one of the required secrets: API_BASE_URL, ADMIN_EMAIL, ADMIN_PASSWORD."
            echo "Set these under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          echo "Logging in (also wakes a sleeping free-tier backend - can take ~30-50s)..."
          LOGIN_RESPONSE=$(curl -sS --max-time 90 -X POST "$API_BASE_URL/v1/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}")

          TOKEN=$(echo "$LOGIN_RESPONSE" | jq -r '.data.access_token // empty')

          if [ -z "$TOKEN" ]; then
            echo "Login failed. Response was:"
            echo "$LOGIN_RESPONSE"
            exit 1
          fi

          echo "Triggering the reminder job..."
          TRIGGER_RESPONSE=$(curl -sS --max-time 30 -X POST "$API_BASE_URL/v1/admin/trigger-reminders" \
            -H "Authorization: Bearer $TOKEN")

          echo "$TRIGGER_RESPONSE"

          SUCCESS=$(echo "$TRIGGER_RESPONSE" | jq -r '.success // false')
          if [ "$SUCCESS" != "true" ]; then
            echo "Reminder trigger did not report success."
            exit 1
          fi
