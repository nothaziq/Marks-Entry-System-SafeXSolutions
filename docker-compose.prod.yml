version: "3.9"

# Production compose file: builds the frontend as static assets served by
# nginx (see frontend/Dockerfile.prod) instead of running Vite's dev
# server, and requires real config values instead of localhost defaults.
#
# Usage:
#   cp .env.prod.example .env.prod
#   # fill in real values in .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up --build -d

services:
  db:
    image: postgres:16
    container_name: attendance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.prod}
      POSTGRES_DB: attendance_db
    volumes:
      - attendance_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance_user -d attendance_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No host port mapping here on purpose - the database should only be
    # reachable from other containers on this network, not the public
    # internet. Use `docker compose exec db psql ...` for admin access.

  api:
    build: ./backend
    container_name: attendance_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://attendance_user:${DB_PASSWORD:?Set DB_PASSWORD in .env.prod}@db:5432/attendance_db
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env.prod - generate with: python -c \"import secrets; print(secrets.token_hex(32))\"}"
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: ${FRONTEND_URL:?Set FRONTEND_URL in .env.prod, e.g. https://attendance.yourdomain.com}
      GMAIL_ADDRESS: ${GMAIL_ADDRESS:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
      GMAIL_SENDER_NAME: ${GMAIL_SENDER_NAME:-Marks Entry System}
      REMINDER_HOUR: ${REMINDER_HOUR:-17}
      REMINDER_MINUTE: ${REMINDER_MINUTE:-0}
    expose:
      - "8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # Not published to the host directly - put a reverse proxy (nginx/Caddy)
    # in front of this doing TLS termination, and proxy /v1/* and /health
    # to this service. See the HTTPS item in the deployment-readiness list.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${API_URL:?Set API_URL in .env.prod, e.g. https://api.yourdomain.com}
    container_name: attendance_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  attendance_pgdata:
