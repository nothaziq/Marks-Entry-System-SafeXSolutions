server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets - meaningfully shrinks the JS bundle over the wire.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache hashed build assets aggressively - Vite fingerprints filenames,
    # so a new deploy naturally gets new URLs and busts any stale cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: React Router handles paths like /dashboard, /classes,
    # /attendance/:classId client-side. Any path that isn't a real static
    # file must still fall through to index.html, or a hard refresh (or
    # someone bookmarking /dashboard) hits nginx directly and 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
