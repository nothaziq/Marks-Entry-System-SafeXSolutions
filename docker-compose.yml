version: "3.9"

services:
  db:
    image: postgres:16
    container_name: attendance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: attendance_pass
      POSTGRES_DB: attendance_db
    ports:
      - "5432:5432"
    volumes:
      - attendance_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance_user -d attendance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: attendance_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://attendance_user:attendance_pass@db:5432/attendance_db
      SECRET_KEY: change-this-to-a-long-random-string
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: attendance_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # The React app runs in the BROWSER on your host machine, not inside
      # Docker's internal network - so it needs the host-visible address,
      # not the "api" service name.
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount your local source into the container so the Vite dev
      # server (and its HMR/file-watcher) sees edits immediately, instead
      # of only picking them up on the next `docker compose build`.
      - ./frontend:/app
      # Anonymous volume so the container keeps its own node_modules
      # (built for Linux inside the image) instead of the host's, which
      # may be missing or built for a different OS/arch.
      - /app/node_modules

volumes:
  attendance_pgdata:
